<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ruby desktop ♡</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Orbitron:wght@400;700&family=Space+Grotesk:wght@300;400;500&family=Fredoka+One&display=swap" rel="stylesheet"/>
<script>
// Minimal Supabase client — no external CDN needed
window.supabase = {
  createClient(url, key) {
    // New sb_publishable_ keys: send ONLY as apikey header, NOT in Authorization: Bearer
    // Authorization: Bearer should only carry a real user JWT after login
    const headers = {
      'apikey': key,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };
    let _session = null;

    const getAuthHeader = () => {
      // After login, use the real user JWT. Otherwise omit Authorization entirely.
      return _session?.access_token ? { 'Authorization': 'Bearer ' + _session.access_token } : {};
    };

    const rest = (path, opts={}) => {
      const { headers: extraHeaders, ...restOpts } = opts;
      return fetch(url + '/rest/v1/' + path, {
        ...restOpts,
        headers: { ...headers, ...getAuthHeader(), ...(extraHeaders||{}) }
      }).then(r => r.json().then(d => ({ data: d, error: r.ok ? null : d })));
    };

    const withTimeout = (p, ms=8000) =>
      Promise.race([p, new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), ms))]);

    const authFetch = (path, body, method='POST') =>
      withTimeout(fetch(url + '/auth/v1/' + path, {
        method, headers: { 'apikey': key, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      })).then(r => r.json().then(d => {
        if (r.ok) { _session = d; return { data: { user: d.user, session: d }, error: null }; }
        const msg = d.error_description || d.msg || d.message || d.error || 'access denied ✕';
        return { data: { user: null }, error: { message: msg } };
      })).catch(e => ({ data: { user: null }, error: { message: e.message === 'timeout' ? 'Connection blocked in preview — download & open locally ♡' : e.message } }));

    return {
      auth: {
        signInWithPassword: ({ email, password }) => authFetch('token?grant_type=password', { email, password }),
        signOut: () => { _session = null; return Promise.resolve(); }
      },
      from(table) {
        return {
          insert(row) {
            return rest(table, { method: 'POST', body: JSON.stringify(row) });
          },
          select(cols='*') {
            let q = table + '?select=' + cols;
            const chain = {
              order(col, { ascending }={}) { q += '&order=' + col + (ascending ? '.asc' : '.desc'); return chain; },
              then(resolve, reject) { return rest(q, { headers: getAuthHeader() }).then(resolve, reject); }
            };
            return chain;
          },
          update(row) {
            let q = table;
            const chain = {
              eq(col, val) { q += '?'+col+'=eq.'+encodeURIComponent(val); return chain; },
              then(resolve, reject) {
                return rest(q, { method: 'PATCH', body: JSON.stringify(row),
                  headers: { ...getAuthHeader(), 'Prefer': 'return=representation' }
                }).then(resolve, reject);
              }
            };
            return chain;
          }
        };
      }
    };
  }
};
</script>
<style>
:root{
  --crimson:#c2006b;
  --rose:#ff3dac;
  --lav:#ff9de2;
  --lav-dim:#e05fb0;
  --bg:#0a0010;
  --glass:rgba(255,61,172,0.07);
  --glass-border:rgba(255,157,226,0.3);
  --glow:0 0 18px rgba(255,61,172,0.45),0 0 50px rgba(255,157,226,0.15);
}
*{box-sizing:border-box;margin:0;padding:0;}

/* ── BOOT SCREEN ── */
#boot{
  position:fixed;inset:0;
  background:#000;
  z-index:9999;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  font-family:'VT323',monospace;
  color:var(--lav);
  transition: opacity 0.6s ease;
}
#boot-logo{
  font-size:64px;
  background:linear-gradient(90deg,#ff3dac,#ff9de2,#ff3dac);
  background-size:200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 2s linear infinite;
  margin-bottom:16px;
}
#boot-log{
  font-size:14px;color:rgba(199,119,232,0.8);
  letter-spacing:2px;min-height:120px;width:320px;
  text-align:left;line-height:2;
  white-space: pre-line;
}
#boot-bar-wrap{
  width:320px;height:6px;background:rgba(255,255,255,0.08);
  border-radius:4px;margin-top:16px;overflow:hidden;
}
#boot-bar{
  height:100%;width:0;
  background:linear-gradient(90deg,var(--crimson),var(--rose),var(--lav));
  border-radius:4px;
  transition:width 0.1s linear;
}
#boot.done{opacity:0;pointer-events:none;}
#boot.hidden{display:none;}

/* ── BODY ── */
body{
  background:radial-gradient(ellipse at 50% 0%,#3d0040 0%,#1a0025 35%,var(--bg) 100%);
  color:white;
  font-family:'Space Grotesk',Arial,sans-serif;
  min-height:100vh;overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);
  pointer-events:none;z-index:1000;
}

@keyframes crt{0%,100%{opacity:1;}92%{opacity:1;}93%{opacity:0.85;}94%{opacity:1;}97%{opacity:0.9;}98%{opacity:1;}}
#desktop{animation:crt 8s infinite; position:fixed; inset:0; padding-bottom:60px; display:none; overflow:hidden;}
#desktop.on { display:block; }

/* ── SHORTCUT GRID ── */
.desktop-shortcuts {
  position: absolute;
  top: 60px;
  left: 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  z-index: 10;
}
.shortcut {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 75px;
  height: 75px;
  background: rgba(255, 61, 172, 0.03);
  border: 1px solid rgba(255, 157, 226, 0.1);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
  -webkit-user-select: none;
}
.shortcut:hover {
  background: rgba(255, 61, 172, 0.15);
  border-color: var(--rose);
  box-shadow: var(--glow);
  transform: translateY(-2px);
}
.shortcut-icon { font-size: 24px; margin-bottom: 4px; }
.shortcut-label { font-family: 'Orbitron', sans-serif; font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--lav); text-align: center; }

/* ── WINDOWED SYSTEM ── */
.window {
  position:absolute;
  width: min(92vw, 440px);
  height: min(500px, calc(100vh - 120px));
  background:rgba(14,0,22,.95); border:1px solid var(--glass-border);
  border-radius:6px; box-shadow:var(--glow);
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  display:flex; flex-direction:column; z-index:100;
}
.window.dragging { box-shadow:0 0 40px rgba(255,61,172,0.45),0 12px 48px rgba(0,0,0,0.8); }
.window::after { content:''; position:absolute; inset:-5px; border-radius:8px; border:1px solid rgba(199,119,232,0.15); pointer-events:none; }
.window::before { content:'✿'; position:absolute; top:-13px; left:50%; transform:translateX(-50%); font-size:16px; color:var(--rose); background:#0a0010; padding:0 4px; line-height:1; z-index:3; }
.win-cwing { position:absolute; font-size:11px; color:var(--lav); opacity:0.65; line-height:1; z-index:3; }
.win-cwing.tl { top:-8px; left:8px; }
.win-cwing.tr { top:-8px; right:8px; transform:scaleX(-1); }
.win-cwing.bl { bottom:-8px; left:8px; transform:scaleY(-1); }
.win-cwing.br { bottom:-8px; right:8px; transform:scale(-1,-1); }

.titlebar {
  background:linear-gradient(90deg,rgba(255,61,172,0.12),rgba(192,132,252,0.12));
  border-bottom:1px solid rgba(255,61,172,0.2);
  padding:9px 12px; display:flex; align-items:center; gap:8px;
  cursor:grab; touch-action:none; border-radius:6px 6px 0 0; flex-shrink:0;
  user-select: none;
  -webkit-user-select: none;
}
.titlebar:active { cursor: grabbing; }
.titlebar-dot { width:10px; height:10px; border-radius:50%; background:var(--rose); box-shadow:0 0 6px var(--rose); }
.titlebar-label { font-family:'Orbitron',sans-serif; font-size:10px; color:var(--lav); letter-spacing:1px; text-transform:uppercase; flex:1; }
.close-btn {
  width:22px; height:22px; border-radius:50%;
  background:rgba(255,61,172,0.27); border:1px solid rgba(255,61,172,0.4);
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:14px; color:var(--lav); transition:background 0.2s; flex-shrink:0;
}
.close-btn:hover { background:var(--rose); color:#fff; }
.win-body { overflow-y:auto; padding:16px; flex:1; scrollbar-width: thin; scrollbar-color: var(--rose) transparent; }

/* ── NAV BAR ── */
.nav {
  position:fixed; bottom:0; width:100%; left:0;
  display:flex; justify-content:center; gap:6px; flex-wrap:wrap;
  background:rgba(7,0,15,0.95);
  padding:8px 8px; padding-bottom:max(8px,env(safe-area-inset-bottom));
  border-top:1px solid rgba(255,61,172,0.3);
  backdrop-filter:blur(20px); z-index:9998;
  box-shadow:0 -2px 30px rgba(199,119,232,0.15);
}
.nav button {
  background:none; border:1px solid transparent;
  color:rgba(255,157,226,0.55);
  font-family:'Orbitron',sans-serif; font-size:10px; letter-spacing: 0.5px;
  padding:8px 14px; border-radius:20px; cursor:pointer; transition:all 0.2s;
}
.nav button:hover, .nav button.active { color:var(--rose); border-color:var(--rose); background:rgba(255,61,172,0.1); text-shadow: 0 0 6px var(--rose); }

/* ── SECTIONS & CARDS ── */
.section { display: block; width: 100%; }
@keyframes shimmer{to{background-position:200% center;}}
.card{
  background:var(--glass); border:1px solid var(--glass-border); border-radius:4px;
  padding:22px 18px 18px; margin-bottom:20px; box-shadow:var(--glow); position:relative;
}
.card::after{
  content:''; position:absolute; inset:-5px; border-radius:6px;
  border:1px solid rgba(199,119,232,0.15); pointer-events:none;
}
.card::before{
  content:'✿'; position:absolute; top:-13px; left:50%; transform:translateX(-50%);
  font-size:18px; color:var(--rose); text-shadow:0 0 10px var(--rose); background:var(--bg); padding:0 4px; line-height:1;
}
.card .bline-t, .card .bline-b{ position:absolute; left:28px; right:28px; height:1px; pointer-events:none; }
.card .bline-t{top:-1px;background:linear-gradient(90deg,transparent,var(--rose) 30%,var(--lav) 70%,transparent);opacity:0.9;}
.card .bline-b{bottom:-1px;background:linear-gradient(90deg,transparent,var(--lav) 30%,var(--rose) 70%,transparent);opacity:0.4;}
.card .cwing{ position:absolute; font-size:12px; color:var(--lav); opacity:0.65; text-shadow:0 0 6px var(--lav); }
.card .cwing.tl{top:-9px;left:8px;}
.card .cwing.tr{top:-9px;right:8px;transform:scaleX(-1);}
.card .cwing.bl{bottom:-9px;left:8px;transform:scaleY(-1);}
.card .cwing.br{bottom:-9px;right:8px;transform:scale(-1,-1);}

.hero-card{ border-color:rgba(255,45,120,0.5); background:linear-gradient(135deg,rgba(194,0,107,0.2),rgba(255,157,226,0.1)); }
.hero-card::before{color:var(--lav);text-shadow:0 0 10px var(--lav),0 0 22px rgba(199,119,232,0.5);}
.hero-card .cwing{color:var(--rose);text-shadow:0 0 6px var(--rose);}
.hero-title{
  font-family:'Fredoka One',sans-serif;font-size:46px;line-height:1;margin-bottom:8px;
  background:linear-gradient(90deg,#ff3dac,#ff9de2,#ff3dac);background-size:200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 3s linear infinite;letter-spacing:1px;
}
.grad{ background:linear-gradient(90deg,var(--rose),var(--lav)); -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }
.glitch{font-family:'VT323',monospace;font-size:14px;color:var(--lav);letter-spacing:2px;opacity:0.8;}
.status-row{display:flex;align-items:center;gap:8px;margin:10px 0;font-size:12px;font-family:'Orbitron',sans-serif;letter-spacing:1px;}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.online{background:#3cff7a;box-shadow:0 0 8px #3cff7a;animation:blink 1.8s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
h2{font-family:'Fredoka One',sans-serif;font-size:28px;margin-bottom:10px;color:#fff;}
h3{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:2px;color:var(--lav);margin-bottom:8px;text-transform:uppercase;}
p,li{font-size:13px;line-height:1.6;color:rgba(255,255,255,0.8);}

/* ── BANK & SOCIALS ── */
.bank-item, .social-item{
  display:flex;align-items:center;gap:12px;padding:12px;margin-bottom:8px;
  border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(199,119,232,0.15);
  font-size:14px;transition:all 0.2s;cursor:pointer;
}
.bank-item:hover, .social-item:hover{background:rgba(199,119,232,0.12);border-color:var(--lav);box-shadow:0 0 12px rgba(199,119,232,0.2);}
.bank-icon{font-size:20px;width:32px;text-align:center;}

/* ── PROFILE ── */
.garu-stat{
  background:rgba(255,255,255,0.04);border:1px solid rgba(199,119,232,0.2);
  border-radius:10px;padding:8px 12px;display:flex;flex-direction:column;gap:2px;
}
.gs-label{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2px;color:var(--lav);text-transform:uppercase;}
.gs-val{font-family:'VT323',monospace;font-size:22px;color:white;}
.garu-tag{
  background:linear-gradient(135deg,rgba(122,12,34,0.3),rgba(199,119,232,0.15));
  border:1px solid rgba(255,45,120,0.3);border-radius:20px;padding:5px 12px;font-size:12px;white-space:nowrap;
}

/* ── RULES ── */
.rule-tag{
  display:inline-block;background:rgba(199,119,232,0.15);border:1px solid rgba(199,119,232,0.3);
  border-radius:20px;padding:4px 12px;font-size:12px;font-family:'Orbitron',sans-serif;letter-spacing:1px;margin:3px;
}
.rule-tag.danger{background:rgba(255,45,120,0.12);border-color:rgba(255,45,120,0.35);color:#ff8aaa;}

/* ── INPUTS & BUTTONS ── */
input,select,textarea{
  width:100%;max-width:100%;padding:11px 14px;margin:6px 0;border-radius:10px;
  border:1px solid rgba(199,119,232,0.3);background:rgba(0,0,0,0.4);
  color:white;font-family:'Space Grotesk',sans-serif;font-size:13px;
  outline:none;transition:border-color 0.2s,box-shadow 0.2s;
  box-sizing:border-box;
}
input[type="date"]{width:100%;max-width:100%;box-sizing:border-box;-webkit-appearance:none;appearance:none;color-scheme:dark;}
.form-wrap{width:100%;overflow:hidden;}
input:focus,select:focus,textarea:focus{border-color:var(--lav);box-shadow:0 0 10px rgba(199,119,232,0.25);}
select option{background:#1a001f;}
textarea{min-height:80px;resize:vertical;}
.btn{
  width:100%;padding:12px;border:none;border-radius:10px;
  background:linear-gradient(135deg,#c2006b,#ff3dac);
  color:white;cursor:pointer;margin-top:8px;
  font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;
  transition:all 0.25s;
}
.btn:hover{background:linear-gradient(135deg,#ff3dac,#ff9de2);box-shadow:0 0 20px rgba(199,119,232,0.4);transform:translateY(-1px);}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
  background:rgba(10,0,18,0.95);border:1px solid var(--lav);border-radius:12px;
  padding:12px 24px;font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:1px;
  color:var(--lav);z-index:9997;opacity:0;transition:all 0.3s;pointer-events:none;
  box-shadow:0 0 20px rgba(199,119,232,0.3);white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#toast.error{border-color:var(--rose);color:var(--rose);box-shadow:0 0 20px rgba(255,45,120,0.3);}

/* ── ADMIN PANEL ── */
#admin-panel{
  position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:9000;
  display:none;align-items:center;justify-content:center;backdrop-filter:blur(12px);
}
#admin-panel.open{display:flex;}
.admin-box{
  background:linear-gradient(135deg,#0d0015,#120020);
  border:1px solid var(--lav);border-radius:24px;
  padding:28px 20px 20px;width:min(96vw,480px);max-height:88vh;
  overflow-y:auto;overflow-x:hidden;
  box-shadow:0 0 60px rgba(199,119,232,0.3),0 0 120px rgba(255,45,120,0.1);
  scrollbar-width:thin;scrollbar-color:var(--lav-dim) transparent;
}
.admin-box::-webkit-scrollbar{width:4px;}
.admin-box::-webkit-scrollbar-thumb{background:var(--lav-dim);border-radius:4px;}
.admin-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:20px;padding-bottom:14px;
  border-bottom:1px solid rgba(199,119,232,0.2);
}
.admin-app-card{
  background:rgba(199,119,232,0.05);border:1px solid rgba(199,119,232,0.18);
  border-radius:16px;padding:16px;margin-bottom:12px;transition:border-color 0.2s;
}
.admin-app-card:hover{border-color:rgba(199,119,232,0.4);}
.admin-app-card.approved{border-color:rgba(60,255,122,0.3);background:rgba(60,255,122,0.04);}
.admin-app-card.blocked{border-color:rgba(255,45,120,0.3);background:rgba(255,45,120,0.04);}
.app-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.app-name{font-family:'VT323',monospace;font-size:22px;color:white;line-height:1;}
.app-meta{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:1px;color:rgba(255,255,255,0.35);margin-top:3px;}
.app-reason{font-size:12px;color:rgba(255,255,255,0.6);line-height:1.5;background:rgba(0,0,0,0.2);border-radius:8px;padding:8px 10px;margin-bottom:10px;}
.app-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.app-pill{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:1px;padding:3px 10px;border-radius:20px;background:rgba(199,119,232,0.12);border:1px solid rgba(199,119,232,0.25);color:var(--lav);}
.app-pill.discord{background:rgba(88,101,242,0.15);border-color:rgba(88,101,242,0.4);color:#a5adff;}
.app-actions{display:flex;gap:8px;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:9px;font-family:'Orbitron',sans-serif;letter-spacing:1px;white-space:nowrap;}
.badge.pending{background:rgba(255,200,0,0.15);border:1px solid rgba(255,200,0,0.4);color:#ffc800;}
.badge.approved{background:rgba(60,255,122,0.12);border:1px solid rgba(60,255,122,0.3);color:#3cff7a;}
.badge.blocked{background:rgba(255,45,120,0.12);border:1px solid rgba(255,45,120,0.3);color:#ff2d78;}
.admin-btn{flex:1;padding:8px 4px;border:none;border-radius:10px;cursor:pointer;font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:1px;transition:all 0.2s;}
.admin-btn.approve{background:rgba(60,255,122,0.15);color:#3cff7a;border:1px solid rgba(60,255,122,0.3);}
.admin-btn.approve:hover{background:rgba(60,255,122,0.3);}
.admin-btn.block{background:rgba(255,45,120,0.15);color:#ff2d78;border:1px solid rgba(255,45,120,0.3);}
.admin-btn.block:hover{background:rgba(255,45,120,0.3);}

/* ── PASSWORD MODAL ── */
#pwd-modal{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px);}
#pwd-modal.open{display:flex;}
.pwd-box{background:#0d0015;border:1px solid var(--lav);border-radius:20px;padding:28px 24px;width:min(90vw,340px);box-shadow:0 0 40px rgba(199,119,232,0.25);text-align:center;}
.pwd-box h3{margin-bottom:16px;font-size:14px;}
.pwd-box input{margin-bottom:12px;text-align:center;letter-spacing:3px;}

/* ── SPARK / CLOCK ── */
#clock-widget { position:absolute; top:14px; right:18px; font-family:'VT323',monospace; font-size:22px; color:var(--lav); letter-spacing:1px; pointer-events:none; z-index:10; }
.spark { position:fixed; pointer-events:none; font-size:14px; z-index:9000; line-height:1; animation:sparkfade 0.7s forwards; }
@keyframes sparkfade { 0%{opacity:1;transform:translateY(0) scale(1);} 100%{opacity:0;transform:translateY(-22px) scale(0.2);} }

@media (prefers-reduced-motion: reduce) {
  #boot-logo, .hero-title { animation: none; }
  #desktop { animation: none; }
  .spark { display: none; }
}

@media(min-width:900px){
  .nav{
    flex-direction:column;width:200px;height:100vh;
    top:0;bottom:auto;left:0;right:auto;
    justify-content:flex-start;padding:30px 12px;gap:4px;

(function(){
  const c=document.getElementById('starfield');
  const ctx=c.getContext('2d');
  let W,H,stars=[];
  function init(){
    W=c.width=window.innerWidth; H=c.height=window.innerHeight;
    stars=Array.from({length:120},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+0.2,a:Math.random(),da:(Math.random()*0.005+0.001)*(Math.random()<0.5?1:-1)}));
  }
  function tick(){
    ctx.clearRect(0,0,W,H);
    stars.forEach(s=>{
      s.a+=s.da; if(s.a<=0||s.a>=1) s.da*=-1;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,157,226,${s.a})`; ctx.fill();
    });
    requestAnimationFrame(tick);
  }
  init(); tick(); window.addEventListener('resize',init);
})();

const actx = new (window.AudioContext||window.webkitAudioContext)();
function sfx(type){
  try{
    const o=actx.createOscillator(), g=actx.createGain();
    o.connect(g); g.connect(actx.destination);
    if(type==='click'){
      o.frequency.setValueAtTime(880,actx.currentTime);
      o.frequency.exponentialRampToValueAtTime(440,actx.currentTime+0.08);
      g.gain.setValueAtTime(0.08,actx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.1);
      o.start(); o.stop(actx.currentTime+0.1);
    } else if(type==='success'){
      [523,659,784].forEach((f,i)=>{
        const oo=actx.createOscillator(),gg=actx.createGain();
        oo.connect(gg);gg.connect(actx.destination);
        oo.frequency.value=f;
        gg.gain.setValueAtTime(0.07,actx.currentTime+i*0.12);
        gg.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+i*0.12+0.15);
        oo.start(actx.currentTime+i*0.12); oo.stop(actx.currentTime+i*0.12+0.15);
      });
    } else if(type==='error'){
      o.type='sawtooth';
      o.frequency.setValueAtTime(220,actx.currentTime);
      o.frequency.exponentialRampToValueAtTime(110,actx.currentTime+0.2);
      g.gain.setValueAtTime(0.07,actx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.2);
      o.start(); o.stop(actx.currentTime+0.2);

        oo.frequency.value=f; oo.type='sine';

      });
    }

}

// ── WINDOW MANAGER ──
const openWindows = {};
let topZIndex = 100;
let cascadeStep = 0;
const MAX_CASCADE = 4;

function getDesktopBounds() {
  const desk = document.getElementById('desktop');
  const rect = desk.getBoundingClientRect();
  const leftOffset = window.innerWidth >= 900 ? 220 : 0;
  return { left: leftOffset, top: rect.top, right: rect.right, bottom: rect.bottom, width: rect.width - leftOffset };
}

function openApp(id) {
  if (!APP_CONTENT[id]) return;
  sfx('click');

  document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
  const activeBtn = document.getElementById('btn-'+id);
  if (activeBtn) activeBtn.classList.add('active');

  if (openWindows[id]) { focusWindow(openWindows[id]); return; }

  const win = document.createElement('div');
  win.className = 'window';

  const bounds = getDesktopBounds();
  const winW = Math.min(440, bounds.width * 0.92);
  const winH = Math.min(500, window.innerHeight - 120);
  const offsetX = (cascadeStep % MAX_CASCADE) * 20;
  const offsetY = (cascadeStep % MAX_CASCADE) * 20;
  cascadeStep++;

  const spawnLeft = Math.max(bounds.left + 10, Math.min(bounds.left + 60 + offsetX, bounds.right - winW - 10));
  const spawnTop  = Math.max(10, Math.min(80 + offsetY, window.innerHeight - winH - 80));

  win.style.left = spawnLeft + 'px';
  win.style.top  = spawnTop  + 'px';
  win.style.width = winW + 'px';
  win.style.zIndex = ++topZIndex;

  const WINGS = `<span class="win-cwing tl">⚜</span><span class="win-cwing tr">⚜</span><span class="win-cwing bl">⚜</span><span class="win-cwing br">⚜</span>`;
  win.innerHTML = `
    ${WINGS}
    <div class="titlebar">
      <div class="titlebar-dot"></div>
      <div class="titlebar-label">${APP_CONTENT[id].title}</div>
      <div class="close-btn" id="closebtn-${id}">✕</div>
    </div>
    <div class="win-body">${APP_CONTENT[id].html}</div>
  `;

  document.getElementById('desktop').appendChild(win);
  openWindows[id] = win;

  win.querySelector('#closebtn-'+id).addEventListener('click', (e) => { e.stopPropagation(); closeApp(id); });
  makeDraggable(win);
  win.addEventListener('mousedown', () => focusWindow(win));
  win.addEventListener('touchstart', () => focusWindow(win), { passive: true });

  // Set birthday max after rendering apply form
  if (id === 'apply') {
    const d = new Date();
    d.setFullYear(d.getFullYear() - 18);
    const field = win.querySelector('#f-birthday');
    if (field) field.max = d.toISOString().split('T')[0];
  }
}

function closeApp(id) {
  if (openWindows[id]) { openWindows[id].remove(); delete openWindows[id]; }
  const btn = document.getElementById('btn-'+id);
  if (btn) btn.classList.remove('active');
  if (Object.keys(openWindows).length === 0) { topZIndex = 100; cascadeStep = 0; }
}

function focusWindow(win) { win.style.zIndex = ++topZIndex; }

// ── DRAG SYSTEM ──
function makeDraggable(win) {
  const titlebar = win.querySelector('.titlebar');
  let startMouseX=0, startMouseY=0, startWinLeft=0, startWinTop=0;

  titlebar.addEventListener('mousedown', dragStart);
  titlebar.addEventListener('touchstart', dragStart, { passive: false });

  function dragStart(e) {
    if (e.target.classList.contains('close-btn') || (e.target.id && e.target.id.startsWith('closebtn'))) return;
    focusWindow(win);
    win.classList.add('dragging');
    const isTouch = e.type === 'touchstart';
    if (isTouch) e.preventDefault();
    const clientX = isTouch ? e.touches[0].clientX : e.clientX;
    const clientY = isTouch ? e.touches[0].clientY : e.clientY;
    startMouseX = clientX; startMouseY = clientY;
    startWinLeft = win.offsetLeft; startWinTop = win.offsetTop;
    const moveEvent = isTouch ? 'touchmove' : 'mousemove';
    const upEvent   = isTouch ? 'touchend'  : 'mouseup';

    function onMove(e) {
      if (e.cancelable) e.preventDefault();
      const cx = e.touches ? e.touches[0].clientX : e.clientX;
      const cy = e.touches ? e.touches[0].clientY : e.clientY;
      const maxLeft = window.innerWidth  - win.offsetWidth  - 4;
      const maxTop  = window.innerHeight - win.offsetHeight - 4;
      win.style.left = Math.max(0, Math.min(startWinLeft + cx - startMouseX, maxLeft)) + 'px';
      win.style.top  = Math.max(0, Math.min(startWinTop  + cy - startMouseY, maxTop))  + 'px';
    }
    function onUp() {
      win.classList.remove('dragging');
      document.removeEventListener(moveEvent, onMove);
      document.removeEventListener(upEvent, onUp);
    }
    document.addEventListener(moveEvent, onMove, { passive: false });
    document.addEventListener(upEvent, onUp);
  }
}

// ── APPLICATION SUBMIT ──
function submitApp() {
  const win = openWindows['apply'];
  if (!win) return;
  const birthday = win.querySelector('#f-birthday').value.trim();
  if (birthday) {
    const dob = new Date(birthday);
    const today = new Date();
    let age = today.getFullYear() - dob.getFullYear();
    const m = today.getMonth() - dob.getMonth();
    if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) age--;
    if (age < 18) { window.location.href='https://youtu.be/b2rBhpVDzO8'; return; }
  }
  const name    = win.querySelector('#f-name').value.trim();
  const tz      = win.querySelector('#f-tz').value.trim();
  const ref     = win.querySelector('#f-ref').value.trim();
  const why     = win.querySelector('#f-why').value.trim();
  const method  = win.querySelector('#f-method').value;
  const discord = win.querySelector('#f-discord').value.trim();
  if (!name||!birthday||!tz||!ref||!why||!method||!discord) {
    sfx('error'); toast('all fields required ♡', true); return;
  }
  submitAppAsync(win, name, birthday, tz, ref, why, method, discord);
}

async function submitAppAsync(win, name, birthday, tz, ref, why, method, discord) {
  const btn = win.querySelector('#submit-btn');
  btn.disabled=true; btn.textContent='sending...';
  try {
    const {error} = await db.from('applications').insert({
      name, birthday, timezone:tz, referral:ref,
      reason:why, support_method:method,
      discord_username:discord, status:'pending'
    });
    if (error) throw new Error(error.message);
    sfx('success'); toast('application sent ♡ redirecting...');
    btn.textContent='sent ♡';
    setTimeout(()=>openApp('discord'), 1800);
  } catch(e) {
    sfx('error');
    toast('❌ '+(e.message||'unknown error').substring(0,80), true);
    btn.disabled=false; btn.textContent='submit application →';
  }
}


// ── ADMIN PANEL ──
function escapeHTML(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
function openAdmin() {
  document.getElementById('login-email').value='';
  document.getElementById('login-pass').value='';
  document.getElementById('login-err').style.display='none';
  document.getElementById('pwd-modal').classList.add('open');
  setTimeout(()=>document.getElementById('login-email').focus(), 100);
}
function closePwdModal() { document.getElementById('pwd-modal').classList.remove('open'); }
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const btn   = document.getElementById('login-btn');
  const err   = document.getElementById('login-err');
  if (!email||!pass) { err.textContent='please fill in both fields'; err.style.display='block'; return; }
  btn.disabled=true; btn.textContent='logging in...';
  err.style.display='none';
  const {data, error} = await db.auth.signInWithPassword({email, password:pass});
  btn.disabled=false; btn.textContent='enter →';
  if (error || !data.user) {
    const msg = error?.message || 'access denied ✕';
    err.textContent = msg;
    err.style.display='block';
    if (msg.includes('blocked') || msg.includes('failed') || msg.includes('Load')) {
      if (window.__showSandboxWarning) window.__showSandboxWarning();
    }
    sfx('error');
    return;
  }
  if (data.user.email !== 'thedragongirlgaming@gmail.com') {
    await db.auth.signOut();
    err.textContent='not authorized ✕';
    err.style.display='block';
    sfx('error');
    return;
  }
  closePwdModal();
  loadAdminPanel();
}
async function loadAdminPanel() {
  document.getElementById('admin-panel').classList.add('open');
  const listEl = document.getElementById('admin-list');
  listEl.innerHTML='<p style="color:rgba(255,255,255,0.4);font-size:13px;text-align:center;padding:20px 0;">loading ♡</p>';
  try {
    const {data:rows, error:fetchErr} = await db.from('applications').select('*').order('created_at',{ascending:false});
    if (fetchErr) throw new Error(fetchErr.message);
    if (!rows||rows.length===0) { listEl.innerHTML='<p style="color:rgba(255,255,255,0.4);font-size:13px;">no applications yet ♡</p>'; return; }
    listEl.innerHTML=rows.map(r=>`
      <div class="admin-app-card ${escapeHTML(r.status)}" id="ar-${escapeHTML(r.id)}">
        <div class="app-card-top">
          <div><div class="app-name">${escapeHTML(r.name)}</div><div class="app-meta">${escapeHTML(r.birthday)||'—'} · ${escapeHTML(r.timezone)||'—'} · via ${escapeHTML(r.referral)||'—'}</div></div>
          <span class="badge ${escapeHTML(r.status)}">${escapeHTML(r.status)}</span>
        </div>
        <div class="app-reason">${escapeHTML(r.reason)||'—'}</div>
        <div class="app-pills">
          <span class="app-pill">💳 ${escapeHTML(r.support_method)||'—'}</span>
          ${r.discord_username?`<span class="app-pill discord">💬 ${escapeHTML(r.discord_username)}</span>`:''}
        </div>
        <div class="app-actions">
          <button class="admin-btn approve" onclick="updateStatus('${escapeHTML(r.id)}','approved')">✓ approve</button>
          <button class="admin-btn block" onclick="updateStatus('${escapeHTML(r.id)}','blocked')">✗ block</button>
        </div>
      </div>`).join('');
  } catch(e) {
    listEl.innerHTML=`<p style="color:var(--rose);font-size:13px;text-align:center;padding:20px 0;">❌ ${e.message}</p>`;
  }
}
async function updateStatus(id, status) {
  try {
    const {error} = await db.from('applications').update({status}).eq('id',id);
    if (error) throw new Error(error.message);
    const row = document.getElementById('ar-'+id);
    if (row) { row.querySelector('.badge').className='badge '+status; row.querySelector('.badge').textContent=status; }
    sfx('success'); toast('status updated ♡');
  } catch(e) { sfx('error'); toast('update failed ✕', true); }
}
async function closeAdmin() {
  document.getElementById('admin-panel').classList.remove('open');
  await db.auth.signOut();
}
