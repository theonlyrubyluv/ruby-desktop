<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ruby desktop ♡</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Orbitron:wght@400;700&family=Space+Grotesk:wght@300;400;500&family=Fredoka+One&display=swap" rel="stylesheet"/>
<style>
:root{
  --crimson:#c2006b;
  --rose:#ff3dac;
  --lav:#ff9de2;
  --lav-dim:#e05fb0;
  --bg:#0a0010;
  --glass:rgba(255,61,172,0.07);
  --glass-border:rgba(255,157,226,0.3);
  --glow:0 0 18px rgba(255,61,172,0.45),0 0 50px rgba(255,157,226,0.15);
}
*{box-sizing:border-box;margin:0;padding:0;}

/* ── BOOT SCREEN ── */
#boot{
  position:fixed;inset:0;
  background:#000;
  z-index:9999;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  font-family:'VT323',monospace;
  color:var(--lav);
}
#boot-logo{
  font-size:64px;
  background:linear-gradient(90deg,#ff3dac,#ff9de2,#ff3dac);
  background-size:200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 2s linear infinite;
  margin-bottom:16px;
}
#boot-log{
  font-size:13px;color:rgba(199,119,232,0.7);
  letter-spacing:2px;min-height:120px;width:320px;
  text-align:left;line-height:2;
}
#boot-bar-wrap{
  width:320px;height:6px;background:rgba(255,255,255,0.08);
  border-radius:4px;margin-top:16px;overflow:hidden;
}
#boot-bar{
  height:100%;width:0;
  background:linear-gradient(90deg,var(--crimson),var(--rose),var(--lav));
  border-radius:4px;
  transition:width 0.3s ease;
}
#boot.done{animation:bootfade 0.6s ease forwards;}
@keyframes bootfade{to{opacity:0;pointer-events:none;}}

/* ── BODY ── */
body{
  background:radial-gradient(ellipse at 50% 0%,#3d0040 0%,#1a0025 35%,var(--bg) 100%);
  color:white;
  font-family:'Space Grotesk',Arial,sans-serif;
  min-height:100vh;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px);
  pointer-events:none;z-index:1000;
}

/* CRT flicker */
@keyframes crt{0%,100%{opacity:1;}92%{opacity:1;}93%{opacity:0.85;}94%{opacity:1;}97%{opacity:0.9;}98%{opacity:1;}}
#desktop{animation:crt 8s infinite;}

/* ── CURSOR TRAIL ── */
.star{
  position:fixed;pointer-events:none;font-size:14px;z-index:9998;
  animation:fade-star 0.8s ease forwards;
}
@keyframes fade-star{0%{opacity:1;transform:scale(1) rotate(0deg);}100%{opacity:0;transform:scale(0.3) rotate(180deg) translateY(-20px);}}

/* ── NAV ── */
.nav{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;justify-content:space-around;align-items:center;
  background:rgba(10,0,18,0.95);
  border-top:1px solid var(--lav-dim);
  padding:6px 4px;z-index:500;
  backdrop-filter:blur(12px);
  box-shadow:0 -2px 30px rgba(199,119,232,0.2);
}
.nav button{
  background:none;border:none;color:rgba(255,255,255,0.55);
  font-size:9px;font-family:'Orbitron',sans-serif;letter-spacing:0.5px;
  cursor:pointer;padding:6px 4px;border-radius:8px;transition:all 0.2s;
  display:flex;flex-direction:column;align-items:center;gap:3px;width:auto;margin:0;
}
.nav button .icon{font-size:16px;display:block;}
.nav button:hover,.nav button.active{
  color:var(--lav);text-shadow:0 0 8px var(--lav);background:rgba(199,119,232,0.1);
}
